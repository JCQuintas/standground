name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip GitHub release)"
        required: true
        default: true
        type: boolean

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_P12" ]; then
            echo "No signing certificate configured, will use ad-hoc signing"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm "$CERT_PATH"

          # Allow codesign to use the keychain without prompting
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to the search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create standalone archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../standground-darwin-${{ matrix.arch }}.tar.gz standground libstandground_core.dylib
          cd ../../..

      - name: Copy dylib update artifact
        run: |
          cp "target/${{ matrix.target }}/release/libstandground_core.dylib" \
            "libstandground_core-darwin-${{ matrix.arch }}.dylib"

      - name: Create app bundle
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          APP_DIR="StandGround.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "target/${{ matrix.target }}/release/standground" "$APP_DIR/Contents/MacOS/standground"
          cp "target/${{ matrix.target }}/release/libstandground_core.dylib" "$APP_DIR/Contents/Resources/libstandground_core.dylib"
          cp Info.plist "$APP_DIR/Contents/Info.plist"
          sed -i '' "s|<string>0\.1\.0</string>|<string>${VERSION}</string>|g" "$APP_DIR/Contents/Info.plist"
          cp assets/icon.icns "$APP_DIR/Contents/Resources/icon.icns"

          # Sign with the imported certificate (falls back to ad-hoc if secret not set)
          IDENTITY="${SIGN_IDENTITY:--}"
          codesign --force --deep --sign "$IDENTITY" "$APP_DIR"
          echo "Signed with: $IDENTITY"

          DMG_NAME="StandGround-darwin-${{ matrix.arch }}.dmg"
          DMG_STAGING="dmg-staging"
          rm -rf "$DMG_STAGING"
          mkdir -p "$DMG_STAGING"
          mv "$APP_DIR" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create -volname "StandGround" -srcfolder "$DMG_STAGING" -ov -format UDZO "$DMG_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            standground-darwin-${{ matrix.arch }}.tar.gz
            StandGround-darwin-${{ matrix.arch }}.dmg
            libstandground_core-darwin-${{ matrix.arch }}.dylib

  release:
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            standground-darwin-arm64.tar.gz \
            standground-darwin-x86_64.tar.gz \
            StandGround-darwin-arm64.dmg \
            StandGround-darwin-x86_64.dmg \
            libstandground_core-darwin-arm64.dylib \
            libstandground_core-darwin-x86_64.dylib
