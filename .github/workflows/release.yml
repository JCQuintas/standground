name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, skip GitHub release)'
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create standalone archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../standground-darwin-${{ matrix.arch }}.tar.gz standground
          cd ../../..

      - name: Create app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="StandGround.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "target/${{ matrix.target }}/release/standground" "$APP_DIR/Contents/MacOS/standground"
          cp Info.plist "$APP_DIR/Contents/Info.plist"
          sed -i '' "s|<string>0\.1\.0</string>|<string>${VERSION}</string>|g" "$APP_DIR/Contents/Info.plist"
          if [ -f assets/icon.svg ]; then
            cp assets/icon.svg "$APP_DIR/Contents/Resources/icon.svg"
          fi
          DMG_NAME="StandGround-darwin-${{ matrix.arch }}.dmg"
          hdiutil create -volname "StandGround" -srcfolder "$APP_DIR" -ov -format UDZO "$DMG_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            standground-darwin-${{ matrix.arch }}.tar.gz
            StandGround-darwin-${{ matrix.arch }}.dmg

  release:
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            standground-darwin-arm64.tar.gz \
            standground-darwin-x86_64.tar.gz \
            StandGround-darwin-arm64.dmg \
            StandGround-darwin-x86_64.dmg
